<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-label="Point of sale terminal on stand" fill="none">
  <defs>
    <linearGradient id="pos-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pos-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- tablet body on an angle -->
  <g transform="translate(80,70) skewY(-4)">
    <rect x="0" y="0" width="400" height="240" rx="18" fill="#111827"/>
    <rect x="10" y="10" width="380" height="220" rx="10" fill="url(#pos-screen)"/>

    <!-- top bar -->
    <rect x="26" y="26" width="120" height="22" rx="6" fill="url(#pos-accent)" opacity="0.85"/>
    <rect x="158" y="28" width="60" height="16" rx="4" fill="#374151"/>
    <rect x="226" y="28" width="48" height="16" rx="4" fill="#374151"/>
    <rect x="282" y="28" width="54" height="16" rx="4" fill="#374151"/>
    <rect x="346" y="28" width="36" height="16" rx="4" fill="#374151"/>

    <!-- category label -->
    <rect x="26" y="60" width="80" height="12" rx="3" fill="#F97316"/>

    <!-- grid of menu items -->
    <g>
      <rect x="26" y="84" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="34" y="92" width="66" height="40" rx="4" fill="#fb923c"/>
      <rect x="40" y="136" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>
    <g>
      <rect x="114" y="84" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="122" y="92" width="66" height="40" rx="4" fill="#fbbf24"/>
      <rect x="128" y="136" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>
    <g>
      <rect x="202" y="84" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="210" y="92" width="66" height="40" rx="4" fill="#f87171"/>
      <rect x="216" y="136" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>
    <g>
      <rect x="290" y="84" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="298" y="92" width="66" height="40" rx="4" fill="#60a5fa"/>
      <rect x="304" y="136" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>

    <!-- lower row -->
    <g>
      <rect x="26" y="156" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="34" y="164" width="66" height="40" rx="4" fill="#a78bfa"/>
      <rect x="40" y="208" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>
    <g>
      <rect x="114" y="156" width="82" height="64" rx="8" fill="#1f2937"/>
      <rect x="122" y="164" width="66" height="40" rx="4" fill="#34d399"/>
      <rect x="128" y="208" width="52" height="6" rx="3" fill="#4b5563"/>
    </g>

    <!-- right-side order summary -->
    <rect x="202" y="156" width="170" height="64" rx="8" fill="#f97316"/>
    <rect x="214" y="170" width="90" height="10" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="214" y="188" width="60" height="8" rx="3" fill="#fff" opacity="0.6"/>
  </g>

  <!-- stand -->
  <rect x="264" y="310" width="32" height="28" fill="#0b1020"/>
  <path d="M200 342 L360 342 L380 356 L180 356 Z" fill="#0b1020"/>
</svg>
