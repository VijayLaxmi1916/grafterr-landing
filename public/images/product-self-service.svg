<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" role="img" aria-label="Self-service kiosk" fill="none">
  <defs>
    <linearGradient id="kiosk-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="kiosk-stand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="btn-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- kiosk head -->
  <rect x="140" y="40" width="280" height="360" rx="28" fill="url(#kiosk-body)" stroke="#cbd5e1" stroke-width="2"/>
  <!-- screen bezel -->
  <rect x="156" y="56" width="248" height="300" rx="16" fill="#0f172a"/>

  <!-- screen content: header -->
  <rect x="172" y="72" width="160" height="14" rx="4" fill="#e2e8f0"/>
  <rect x="172" y="92" width="100" height="10" rx="3" fill="#64748b"/>

  <!-- menu row 1 -->
  <g>
    <rect x="172" y="114" width="96" height="72" rx="8" fill="#1e293b"/>
    <rect x="180" y="122" width="80" height="44" rx="4" fill="#fbbf24"/>
    <rect x="180" y="172" width="60" height="6" rx="3" fill="#475569"/>
  </g>
  <g>
    <rect x="276" y="114" width="112" height="72" rx="8" fill="#1e293b"/>
    <rect x="284" y="122" width="96" height="44" rx="4" fill="#f87171"/>
    <rect x="284" y="172" width="70" height="6" rx="3" fill="#475569"/>
  </g>

  <!-- menu row 2 -->
  <g>
    <rect x="172" y="196" width="108" height="72" rx="8" fill="#1e293b"/>
    <rect x="180" y="204" width="92" height="44" rx="4" fill="#34d399"/>
    <rect x="180" y="254" width="64" height="6" rx="3" fill="#475569"/>
  </g>
  <g>
    <rect x="288" y="196" width="100" height="72" rx="8" fill="#1e293b"/>
    <rect x="296" y="204" width="84" height="44" rx="4" fill="#60a5fa"/>
    <rect x="296" y="254" width="58" height="6" rx="3" fill="#475569"/>
  </g>

  <!-- CTA button -->
  <rect x="260" y="290" width="128" height="40" rx="8" fill="url(#btn-accent)"/>
  <rect x="284" y="306" width="80" height="8" rx="4" fill="#fff"/>

  <rect x="172" y="290" width="76" height="40" rx="8" fill="#e2e8f0"/>
  <rect x="190" y="306" width="40" height="8" rx="4" fill="#64748b"/>

  <!-- card reader slot on body -->
  <rect x="220" y="368" width="120" height="16" rx="6" fill="#0f172a"/>
  <rect x="260" y="388" width="40" height="4" rx="2" fill="#94a3b8"/>

  <!-- stand -->
  <rect x="220" y="400" width="120" height="60" rx="10" fill="url(#kiosk-stand)"/>
  <rect x="170" y="460" width="220" height="20" rx="8" fill="#94a3b8"/>
</svg>
